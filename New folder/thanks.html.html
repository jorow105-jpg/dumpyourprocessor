<style>
  :root{
    --navy-900:#0A1A40;--navy-800:#0F2452;--blue:#2356CC;--blue-bright:#2F6BF0;
    --gold:#F6B92B;--gold-deep:#E0991A;--paper:#FBFBFE;

  *{box-sizing:border-box}
  body{margin:0;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:28px;
    background:radial-gradient(1000px 520px at 50% -10%, #163A86, transparent 60%),linear-gradient(180deg,var(--navy-800),var(--navy-900));
    color:#eaf0fb;font-family:"Inter",system-ui,-apple-system,Segoe UI,Roboto,sans-serif;-webkit-font-smoothing:antialiased;text-align:center}
  .card{max-width:520px}
  .brand{display:inline-flex;align-items:center;gap:9px;text-decoration:none;margin-bottom:34px}
  .brand .wm{font-family:"Barlow Semi Condensed",sans-serif;font-weight:800;font-style:italic;font-size:22px;letter-spacing:-.01em;line-height:1;white-space:nowrap}
  .brand .wm .d1{color:#fff}
  .brand .wm .d2{color:#9fb6e6}
  .brand .wm .d3{color:#5b8cff}
  .brand .wm .d4{color:#9fb6e6;font-size:.6em;font-style:normal;letter-spacing:0;margin-left:.5px}
  .logo-ic{color:#fff;display:block}
  .check{width:84px;height:84px;border-radius:50%;background:var(--gold);color:#3a2a00;display:flex;align-items:center;justify-content:center;margin:0 auto 26px;
    box-shadow:0 18px 40px -16px rgba(246,185,43,.6);animation:pop .5s cubic-bezier(.2,1.3,.4,1) both}
  @keyframes pop{from{transform:scale(.4);opacity:0}to{transform:scale(1);opacity:1}}
  h1{font-family:"Barlow Semi Condensed",sans-serif;font-weight:800;text-transform:uppercase;letter-spacing:-.01em;
    font-size:clamp(30px,6vw,46px);line-height:1;margin:0 0 16px;color:#fff}
  h1 .g{color:var(--gold)}
  p{font-size:18px;color:#bccbe8;margin:0 auto;max-width:42ch;line-height:1.5}
  .who{margin-top:26px;display:inline-flex;align-items:center;gap:11px;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.14);
    border-radius:12px;padding:12px 18px}
  .who .ph{width:38px;height:38px;border-radius:9px;background:var(--blue);display:flex;align-items:center;justify-content:center;flex:0 0 auto}
  .who b{font-family:"Barlow Semi Condensed",sans-serif;font-weight:700;font-size:19px;letter-spacing:.01em}
  .who span{display:block;font-size:12px;color:#9fb6e6;letter-spacing:.04em;text-transform:uppercase}
  .home{display:inline-block;margin-top:30px;background:var(--gold);color:#3a2a00;font-weight:700;text-decoration:none;
    border-radius:999px;padding:14px 26px;font-size:16px;transition:.16s}
  .home:hover{background:#ffc740;transform:translateY(-1px)}
  .sendrow{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;margin-top:24px}
  .sbtn{display:inline-flex;align-items:center;gap:8px;background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.16);color:#fff;text-decoration:none;border-radius:10px;padding:13px 18px;font-weight:600;font-size:15px;transition:.16s}
  .sbtn:hover{background:rgba(255,255,255,.13);border-color:var(--gold)}
  .sbtn svg{color:var(--gold);flex:0 0 auto}
  @media (prefers-reduced-motion: reduce){.check{animation:none}}
</style>
</head>
